            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not a member / sprint not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /projects/{projectId}/sprints/{sprintId}/close:
