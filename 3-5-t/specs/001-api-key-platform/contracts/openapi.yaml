  /gateway/{service}/{proxyPath}:
    get:
      tags: [Gateway]
      summary: Gateway proxy（GET）
      description: |
        串流透傳 upstream；本操作的狀態碼可能為 upstream 回應，或平台拒絕（401/403/429/404/5xx）。
        注意：`proxyPath` 在實作中是 greedy（可包含 `/`），此處僅作契約性描述。
      security:
        - bearerAuth: []
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
        - name: proxyPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: upstream 透傳回應（此處不限制 content-type）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/InternalError'

    head:
      tags: [Gateway]
      summary: Gateway proxy（HEAD）
      description: |
        串流透傳 upstream（HEAD）；本操作的狀態碼可能為 upstream 回應，或平台拒絕（401/403/429/404/5xx）。
