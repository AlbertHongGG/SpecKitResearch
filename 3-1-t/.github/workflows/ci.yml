name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Prepare DB
        run: npm run prisma:migrate && npm run prisma:seed

      - name: Start backend
        run: npm run dev:backend &

      - name: Start frontend
        run: npm run dev:frontend &

      - name: Wait for services
        run: |
          npx wait-on http://127.0.0.1:3000 http://127.0.0.1:3001

      - name: E2E
        run: npm run e2e
