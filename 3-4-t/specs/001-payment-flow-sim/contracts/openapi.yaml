        session_ttl_hours:
          type: integer
          minimum: 1
        allowed_currencies:
          type: array
          items:
            type: string
        default_return_method:
          $ref: '#/components/schemas/ReturnMethod'
        webhook_signing:
          $ref: '#/components/schemas/WebhookSigningSettings'
      required: [session_ttl_hours, allowed_currencies, default_return_method, webhook_signing]
      example:
